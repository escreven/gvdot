name: Verify PyPI Distribution

#
# There is a lag between uploading to [Test]PyPI and when the distribution
# becomes visible to pip running in a GitHub VM.  To avoid wasting time, we
# install gvdot and check the version first before installing
# dependencies.
#

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'Repository'
        required: true
        default: 'PyPI'
        type: choice
        options: [ 'PyPI', 'TestPyPI' ]
      version:
        description: 'Expected Version'
        required: true
        type: string

env:
  DEPS: 'liveimport notebook pillow coverage'

jobs:

  preamble:
    name: Preamble
    runs-on: ubuntu-latest
    steps:
    - name: Describe Input
      run: |
        echo "Will install gvdot from ${{ inputs.repository }}."
        echo "Expecting version ${{ inputs.version }}."
      shell: bash
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Release Tag Must Exist
      run: |
        tag_ref="refs/tags/v${{ inputs.version }}"
        if ! git rev-parse -q --verify "$tag_ref" > /dev/null; then
          echo "Version ${{ inputs.version }} not released"
          exit 1
        fi
        echo "Release tag exists"
      shell: bash

  install_and_test:
    needs: preamble
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.12', '3.13', '3.14']
      fail-fast: true

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout gvdot v${{ inputs.version }}
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
        ref: refs/tags/v${{ inputs.version }}

    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Upgrade Pip, Wheel, and Setuptools
      run: |
        python -m pip install --upgrade pip wheel setuptools
      shell: bash

    - name: Install gvdot and Check Version
      run: |
        if [[ "${{ inputs.repository }}" == "PyPI" ]]; then
          python -m pip install --no-deps gvdot
        else
          python -m pip install --no-deps -i https://test.pypi.org/simple/ gvdot
        fi
        installed_version="$(python -c "import importlib.metadata; print(importlib.metadata.version('gvdot'))")"
        echo "gvdot installed from ${{ inputs.repository }}" \
              "is version $installed_version"
        if [[ ! $installed_version == "${{ inputs.version }}" ]]; then
          echo "Expected ${{ inputs.version }}"
          exit 1
        fi
      shell: bash

    - name: Install Dependencies
      run: |
        python -m pip install $DEPS
      shell: bash

    - name: Install Graphviz
      uses: ts-graphviz/setup-graphviz@v2

    - name: Run Tests
      run: |
        dot -V
        python test/main.py -failstop
      shell: bash
