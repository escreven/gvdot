name: Windows Timeout Issue

on:
  workflow_dispatch:

env:
  OLDEST_DEPS: 'ipython==7.23.1 notebook==5.7.0 pillow coverage'
  LATEST_DEPS: 'ipython notebook pillow coverage'

jobs:

  full:
    name: Full
    strategy:
      matrix:
        os: [ windows-latest ]
        python-version: ['3.12', '3.13', '3.14']
        dependencies: [ 'oldest', 'latest' ]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout gvdot
      uses: actions/checkout@v4

    - name: Install Graphviz
      uses: ts-graphviz/setup-graphviz@v2

    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip wheel setuptools
        if [ "${{ matrix.dependencies }}" = "oldest" ]; then
          python -m pip install $OLDEST_DEPS
        else
          python -m pip install $LATEST_DEPS
        fi
        python -m pip install -e .
      shell: bash

    - name: Run Tests
      run: |
        dot -V
        python test/frontend.py
      shell: bash
