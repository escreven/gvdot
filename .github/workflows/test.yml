name: Integration Test

on:
  pull_request:
  workflow_dispatch:

env:
  OLDEST_DEPS: 'ipython==7.23.1 notebook==5.7.0 pillow coverage'
  LATEST_DEPS: 'ipython notebook pillow coverage'

#
# Before running the complete matrix of tests, we test the "canary"
# configuration first: Python 3.12 on Linux.  Because of the nature gvdot, if
# the canary test fails, likely many if not all of the remaining tests will
# fail.
#
# "Latest" here with respect to IPython and notebook means unpinned.  The
# specific package version depends on the Python version running the tests.
#

jobs:

  canary:
    name: Canary [ubuntu-latest, 3.12]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dependencies: [ 'oldest', 'latest' ]
      fail-fast: false
    steps:
    - name: Checkout gvdot
      uses: actions/checkout@v4

    - name: Install Graphviz
      uses: ts-graphviz/setup-graphviz@v2

    - name: Setup Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip wheel setuptools
        if [ "${{ matrix.dependencies }}" = "oldest" ]; then
          python -m pip install $OLDEST_DEPS
        else
          python -m pip install $LATEST_DEPS
        fi
        python -m pip install -e .
      shell: bash

    - name: Run Tests
      run: |
        dot -V
        coverage run \
            --include 'src/gvdot.py' test/main.py -failstop
        coverage report --include=src/gvdot.py --fail-under=100
      shell: bash

  full:
    name: Full
    needs: canary
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.12', '3.13', '3.14']
        dependencies: [ 'oldest', 'latest' ]
        exclude:
          - os: ubuntu-latest
            python-version: '3.12'
            dependencies: 'oldest'
          - os: ubuntu-latest
            python-version: '3.12'
            dependencies: 'latest'
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout gvdot
      uses: actions/checkout@v4

    - name: Install Graphviz
      uses: ts-graphviz/setup-graphviz@v2

    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip wheel setuptools
        if [ "${{ matrix.dependencies }}" = "oldest" ]; then
          python -m pip install $OLDEST_DEPS
        else
          python -m pip install $LATEST_DEPS
        fi
        python -m pip install -e .
      shell: bash

    - name: Run Tests
      run: |
        dot -V
        coverage run \
            --include 'src/gvdot.py' test/main.py -failstop
        coverage report --include=src/gvdot.py --fail-under=100
      shell: bash
